name: Link check

on:
  schedule:
    # First day of every month, 08:30 UTC
    - cron: "30 8 1 * *"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - name: Check live site links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-retries 2
            --accept 200..=299,403,429
            https://bogdan-carcadea.ro
            https://bogdan-carcadea.ro/projects
          fail: false

      - name: Open issue on dead links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Dead links found on bogdan-carcadea.ro"
          content-filepath: ./lychee/out.md
          labels: link-check
